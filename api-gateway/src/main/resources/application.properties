# ===== API Gateway =====
spring.application.name=api-gateway
server.port=8080

# ===== Eureka =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== JWT (shared secret) =====
app.jwt.secret=${JWT_SECRET}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ===== Routes: User Service =====
spring.cloud.gateway.routes[0].id=user-service-auth
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=user-service-users
spring.cloud.gateway.routes[1].uri=lb://user-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**

spring.cloud.gateway.routes[2].id=user-service-oauth2
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[3].id=user-service-oauth2-login
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/login/oauth2/**

# ===== Routes: Measurement Service =====
spring.cloud.gateway.routes[4].id=measurement-service
spring.cloud.gateway.routes[4].uri=lb://measurement-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/quantities/**

# ===== Routes: Admin Service =====
spring.cloud.gateway.routes[5].id=admin-service
spring.cloud.gateway.routes[5].uri=lb://admin-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/admin/**

# ===== Logging =====
logging.level.root=INFO
logging.level.com.app.apigateway=DEBUG
logging.level.org.springframework.cloud.gateway=DEBUG

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
