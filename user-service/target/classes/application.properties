# ===== User Service =====
spring.application.name=user-service
server.port=8081

# ===== Eureka =====
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===== Database (H2) =====
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== H2 Console =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JWT (same secret as API Gateway) =====
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS}

# ===== OAuth2 (Google) =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# ===== OAuth2 Redirect =====
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:8080/swagger-ui.html}

# ===== Mail =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===== Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===== Logging =====
logging.level.root=INFO
logging.level.com.app.userservice=DEBUG

# ===== Async =====
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
